<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bytesized&family=Jersey+10&family=VT323&display=swap" rel="stylesheet">
    <script type="module" src="beta-access.js"></script>
</head>
<body class="dashboard-page">
    <div class="dashboard-header">
        <div class="header-left">
            <a href="index.html" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none; color:inherit;">
                <img src="logo.svg" alt="Blitz Logo" class="dashboard-logo">
                <h1 style="font-family:'Jersey 10'; margin:0; font-size:2.2rem; letter-spacing:1px;">BLITZ</h1>
            </a>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <a class="btn-create" href="index.html" style="text-decoration:none;">Back to Community</a>
        </div>
    </div>

    <main class="dashboard-main">
        <div class="profile-hero dashboard-hero">
            <div class="profile-avatar-wrap">
                <img id="dashboard-avatar" class="account-avatar hidden" alt="Profile">
                <span id="dashboard-avatar-fallback" class="account-avatar-fallback account-avatar-fallback-lg">?</span>
            </div>
            <div>
                <h2 id="dashboard-name">Loading...</h2>
                <p id="dashboard-meta">Preparing your dashboard</p>
            </div>
            <div class="profile-actions">
                <a class="btn-create" id="dashboard-profile-link" href="profile.html">View Public Profile</a>
            </div>
        </div>

        <div class="dashboard-stat-grid">
            <div class="dashboard-stat-card">
                <span class="dashboard-stat-label">Total Spend</span>
                <strong id="dashboard-total-spend">$0.00</strong>
            </div>
            <div class="dashboard-stat-card">
                <span class="dashboard-stat-label">Total Views</span>
                <strong id="dashboard-total-views">0</strong>
            </div>
            <div class="dashboard-stat-card">
                <span class="dashboard-stat-label">Projects</span>
                <strong id="dashboard-project-count">0</strong>
            </div>
            <div class="dashboard-stat-card">
                <span class="dashboard-stat-label">Followers</span>
                <strong id="dashboard-follower-count">0</strong>
            </div>
        </div>

        <div class="dashboard-panels">
            <section class="dashboard-panel">
                <h3>Top Models</h3>
                <div id="dashboard-model-usage" class="dashboard-list"></div>
            </section>
            <section class="dashboard-panel">
                <h3>Followers</h3>
                <div id="dashboard-followers" class="dashboard-list"></div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDz4P07G-B05SqCMyDdCnIyRAJNy19_1oQ",
            authDomain: "blitz-6c88c.firebaseapp.com",
            databaseURL: "https://blitz-6c88c-default-rtdb.firebaseio.com",
            projectId: "blitz-6c88c",
            storageBucket: "blitz-6c88c.firebasestorage.app",
            messagingSenderId: "390946741291",
            appId: "1:390946741291:web:e6ae60970e2847403d9e6e",
            measurementId: "G-WC5KP3MXP9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const dashboardName = document.getElementById('dashboard-name');
        const dashboardMeta = document.getElementById('dashboard-meta');
        const dashboardAvatar = document.getElementById('dashboard-avatar');
        const dashboardAvatarFallback = document.getElementById('dashboard-avatar-fallback');
        const profileLink = document.getElementById('dashboard-profile-link');
        const totalSpendEl = document.getElementById('dashboard-total-spend');
        const totalViewsEl = document.getElementById('dashboard-total-views');
        const projectCountEl = document.getElementById('dashboard-project-count');
        const followerCountEl = document.getElementById('dashboard-follower-count');
        const modelUsageEl = document.getElementById('dashboard-model-usage');
        const followersEl = document.getElementById('dashboard-followers');

        function setAvatar(imgEl, fallbackEl, user) {
            const label = (user?.displayName || user?.email || 'Guest').trim();
            const initial = label.charAt(0).toUpperCase() || '?';
            if (user?.photoURL) {
                imgEl.src = user.photoURL;
                imgEl.classList.remove('hidden');
                fallbackEl.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                fallbackEl.textContent = initial;
                fallbackEl.classList.remove('hidden');
            }
        }

        function formatMoney(amount) {
            return `$${Number(amount || 0).toFixed(4)}`;
        }

        function renderEmpty(container, text) {
            container.innerHTML = `<div class="dashboard-empty">${text}</div>`;
        }

        async function loadDashboard(user) {
            if (!user) {
                dashboardName.textContent = 'Sign in required';
                dashboardMeta.textContent = 'Open the editor or homepage account menu and sign in first.';
                renderEmpty(modelUsageEl, 'No usage data');
                renderEmpty(followersEl, 'No followers to show');
                return;
            }

            const [userSnapshot, projectsSnapshot, followersSnapshot, usageSnapshot] = await Promise.all([
                get(ref(db, 'users/' + user.uid)),
                get(ref(db, 'projects')),
                get(ref(db, 'followers/' + user.uid)),
                get(ref(db, 'users/' + user.uid + '/usageEvents'))
            ]);

            const userData = userSnapshot.exists() ? userSnapshot.val() : {};
            const allProjects = projectsSnapshot.exists()
                ? Object.entries(projectsSnapshot.val()).map(([id, value]) => ({ id, ...value }))
                : [];
            const ownedProjects = allProjects.filter(project => project.ownerUid === user.uid);
            const totalViews = ownedProjects.reduce((sum, project) => sum + (Number(project.views) || 0), 0);
            const followerIds = followersSnapshot.exists() ? Object.keys(followersSnapshot.val()) : [];
            const usageEvents = usageSnapshot.exists() ? Object.values(usageSnapshot.val()) : [];

            dashboardName.textContent = user.displayName || user.email || 'Dashboard';
            dashboardMeta.textContent = `${ownedProjects.length} project${ownedProjects.length === 1 ? '' : 's'} · ${followerIds.length} follower${followerIds.length === 1 ? '' : 's'} · ${usageEvents.length} generations`;
            profileLink.href = `profile.html?user=${encodeURIComponent(user.uid)}`;
            setAvatar(dashboardAvatar, dashboardAvatarFallback, userData.photoURL ? userData : user);

            const totalSpend = usageEvents.reduce((sum, event) => sum + (Number(event.cost) || 0), 0);
            totalSpendEl.textContent = formatMoney(totalSpend);
            totalViewsEl.textContent = totalViews.toLocaleString();
            projectCountEl.textContent = String(ownedProjects.length);
            followerCountEl.textContent = String(followerIds.length);

            const modelUsage = new Map();
            usageEvents.forEach((event) => {
                const modelId = String(event.modelId || 'unknown');
                const entry = modelUsage.get(modelId) || { count: 0, spend: 0 };
                entry.count += 1;
                entry.spend += Number(event.cost) || 0;
                modelUsage.set(modelId, entry);
            });

            const topModels = [...modelUsage.entries()]
                .sort((a, b) => b[1].count - a[1].count || b[1].spend - a[1].spend)
                .slice(0, 5);

            if (!topModels.length) {
                renderEmpty(modelUsageEl, 'No model usage recorded yet');
            } else {
                modelUsageEl.innerHTML = topModels.map(([modelId, entry]) => `
                    <div class="dashboard-list-item">
                        <div>
                            <strong>${escapeHtml(modelId)}</strong>
                            <span>${entry.count} use${entry.count === 1 ? '' : 's'}</span>
                        </div>
                        <span>${formatMoney(entry.spend)}</span>
                    </div>
                `).join('');
            }

            if (!followerIds.length) {
                renderEmpty(followersEl, 'No followers yet');
                return;
            }

            const followerProfiles = await Promise.all(followerIds.map(async (uid) => {
                const snapshot = await get(ref(db, 'users/' + uid));
                return snapshot.exists() ? { uid, ...snapshot.val() } : { uid };
            }));

            followersEl.innerHTML = followerProfiles.map((follower) => {
                const label = follower.displayName || follower.email || `Creator ${follower.uid.slice(0, 6)}`;
                const avatar = follower.photoURL
                    ? `<img class="dashboard-follower-avatar" src="${escapeAttr(follower.photoURL)}" alt="${escapeAttr(label)}">`
                    : `<span class="dashboard-follower-avatar dashboard-follower-avatar-fallback">${escapeHtml(label.charAt(0).toUpperCase() || '?')}</span>`;
                return `
                    <a class="dashboard-list-item dashboard-follower-item" href="profile.html?user=${encodeURIComponent(follower.uid)}">
                        <div class="dashboard-follower-main">
                            ${avatar}
                            <div>
                                <strong>${escapeHtml(label)}</strong>
                                <span>@${escapeHtml(follower.uid.slice(0, 8))}</span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttr(value) {
            return String(value).replaceAll('"', '&quot;');
        }

        onAuthStateChanged(auth, (user) => {
            loadDashboard(user).catch((error) => {
                console.error(error);
                dashboardName.textContent = 'Load error';
                dashboardMeta.textContent = 'Unable to load dashboard data';
            });
        });
    </script>
</body>
</html>
