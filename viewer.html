<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz - Project Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=VT323&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="viewer-page">
    <div class="viewer-header">
        <div class="viewer-header-left">
            <a href="index.html" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none; color:inherit;">
                <img src="logo.svg" alt="Blitz Logo" class="dashboard-logo">
                <h1 style="font-family:'Jersey 10'; margin:0; font-size:1.8rem;">BLITZ</h1>
            </a>
            <div style="display:flex; flex-direction:column; gap:0.2rem;">
                <span class="viewer-project-name" id="project-name">Loading...</span>
                <span id="project-source" style="display:none; font-family:'VT323', monospace; font-size:1rem; color:#8ab4ff; text-transform:uppercase; letter-spacing:0.08em;"></span>
                <a id="project-owner-link" href="#" style="display:none; font-family:'VT323', monospace; font-size:1rem; color:#00ffff; text-decoration:none; letter-spacing:0.04em;"></a>
            </div>
        </div>
        <div class="viewer-header-right">
            <button class="viewer-toggle-btn" id="btn-toggle-code" title="Toggle Code Viewer">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                <span>VIEW CODE</span>
            </button>
            <button class="viewer-toggle-btn" id="btn-fork" title="Fork to Editor">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"></path><line x1="12" y1="12" x2="12" y2="15"></line></svg>
                <span>FORK</span>
            </button>
        </div>
    </div>

    <div class="viewer-body">
        <div class="viewer-preview" id="viewer-preview">
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" style="width:100%; height:100%; border:none; background:#fff;"></iframe>
        </div>
        <div class="viewer-code-panel hidden" id="code-panel">
            <div class="viewer-file-tabs" id="viewer-file-tabs"></div>
            <div id="viewer-monaco" style="width:100%; flex:1;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs/loader.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDz4P07G-B05SqCMyDdCnIyRAJNy19_1oQ",
            authDomain: "blitz-6c88c.firebaseapp.com",
            databaseURL: "https://blitz-6c88c-default-rtdb.firebaseio.com",
            projectId: "blitz-6c88c",
            storageBucket: "blitz-6c88c.firebasestorage.app",
            messagingSenderId: "390946741291",
            appId: "1:390946741291:web:e6ae60970e2847403d9e6e",
            measurementId: "G-WC5KP3MXP9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function decodeKey(k) { return k.replace(/_DOT_/g, '.'); }

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project');

        if (!projectId) {
            document.getElementById('project-name').textContent = 'No project specified';
        } else {
            loadProject(projectId);
        }

        let projectFiles = {};
        let monacoEditor = null;
        let activeViewFile = null;

        async function loadProject(id) {
            try {
                const projRef = ref(db, 'projects/' + id);
                const snapshot = await get(projRef);
                if (!snapshot.exists()) {
                    document.getElementById('project-name').textContent = 'Project not found';
                    return;
                }

                const data = snapshot.val();
                document.getElementById('project-name').textContent = data.name || 'Untitled';
                document.title = (data.name || 'Untitled') + ' - Blitz Viewer';
                const sourceEl = document.getElementById('project-source');
                if (data.forkedFrom?.name) {
                    sourceEl.textContent = 'Forked from ' + data.forkedFrom.name;
                    sourceEl.style.display = 'block';
                } else {
                    sourceEl.style.display = 'none';
                }
                if (data.ownerUid) {
                    const ownerSnapshot = await get(ref(db, 'users/' + data.ownerUid));
                    const ownerData = ownerSnapshot.exists() ? ownerSnapshot.val() : null;
                    const ownerLink = document.getElementById('project-owner-link');
                    ownerLink.textContent = 'By ' + (ownerData?.displayName || ownerData?.email || 'Unknown user');
                    ownerLink.href = 'profile.html?user=' + data.ownerUid;
                    ownerLink.style.display = 'inline';
                }

                // Decode files
                if (data.files) {
                    for (const [encodedName, fileInfo] of Object.entries(data.files)) {
                        const name = decodeKey(encodedName);
                        projectFiles[name] = {
                            content: fileInfo.content || '',
                            lang: fileInfo.lang || 'plaintext'
                        };
                    }
                }

                renderPreview();
                renderFileTabs();

                // Wire fork button
                document.getElementById('btn-fork').addEventListener('click', () => {
                    window.location.href = 'editor.html?forkOf=' + id;
                });

            } catch (e) {
                console.error("Load failed:", e);
                document.getElementById('project-name').textContent = 'Load error';
            }
        }

        function renderPreview() {
            // Find the main HTML file
            let mainHtml = projectFiles['index.html']
                || projectFiles[Object.keys(projectFiles).find(f => f.endsWith('.html'))]
                || null;

            if (!mainHtml) {
                document.getElementById('preview-frame').srcdoc = '<h1 style="color:#ccc;font-family:sans-serif;text-align:center;padding:40px;">No HTML file found</h1>';
                return;
            }

            let htmlContent = mainHtml.content;

            // Create blob URLs for CSS/JS assets and replace references
            for (const [filename, fileObj] of Object.entries(projectFiles)) {
                if (filename.endsWith('.html')) continue;
                let type = 'text/plain';
                if (filename.endsWith('.css')) type = 'text/css';
                else if (filename.endsWith('.js')) type = 'application/javascript';
                const blob = new Blob([fileObj.content], { type });
                const blobUrl = URL.createObjectURL(blob);

                const regexHref = new RegExp('href=["\']\.?\\/?' + filename.replace('.', '\\.') + '["\']', 'g');
                const regexSrc = new RegExp('src=["\']\.?\\/?' + filename.replace('.', '\\.') + '["\']', 'g');
                htmlContent = htmlContent.replace(regexHref, 'href="' + blobUrl + '"');
                htmlContent = htmlContent.replace(regexSrc, 'src="' + blobUrl + '"');
            }

            const blob = new Blob([htmlContent], { type: 'text/html' });
            document.getElementById('preview-frame').src = URL.createObjectURL(blob);
        }

        function renderFileTabs() {
            const tabsEl = document.getElementById('viewer-file-tabs');
            tabsEl.innerHTML = '';
            Object.keys(projectFiles).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'viewer-tab';
                btn.textContent = name;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.viewer-tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    openFileInViewer(name);
                });
                tabsEl.appendChild(btn);
            });
        }

        function openFileInViewer(name) {
            activeViewFile = name;
            if (!monacoEditor) {
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    monacoEditor = monaco.editor.create(document.getElementById('viewer-monaco'), {
                        value: projectFiles[name].content,
                        language: projectFiles[name].lang,
                        theme: 'vs-dark',
                        readOnly: true,
                        automaticLayout: true,
                        minimap: { enabled: false },
                        fontSize: 14,
                        fontFamily: 'ui-monospace, SFMono-Regular, Consolas, monospace'
                    });
                });
            } else {
                monacoEditor.setValue(projectFiles[name].content);
                monaco.editor.setModelLanguage(monacoEditor.getModel(), projectFiles[name].lang);
            }
        }

        // Toggle code panel
        const codePanel = document.getElementById('code-panel');
        const toggleBtn = document.getElementById('btn-toggle-code');
        toggleBtn.addEventListener('click', () => {
            codePanel.classList.toggle('hidden');
            toggleBtn.classList.toggle('active');

            if (!codePanel.classList.contains('hidden') && !activeViewFile) {
                const firstName = Object.keys(projectFiles)[0];
                if (firstName) {
                    document.querySelector('.viewer-tab')?.classList.add('active');
                    openFileInViewer(firstName);
                }
            }
        });
    </script>
</body>
</html>
