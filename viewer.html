<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz - Project Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bytesized&family=Jersey+10&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="beta-access.js"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0c10;
            color: #e5e7eb;
            font-family: Inter, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 22px;
            border-bottom: 1px solid #253041;
            background: rgba(8, 10, 15, 0.92);
            position: sticky;
            top: 0;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            min-width: 0;
        }

        .brand img {
            width: 34px;
            height: 34px;
        }

        .brand h1 {
            margin: 0;
            font-family: "Jersey 10", sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .viewer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .viewer-actions a {
            border: 1px solid #2f3b52;
            background: #121722;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .viewer-actions a:hover {
            background: #182131;
        }

        .viewer-meta {
            padding: 14px 22px;
            border-bottom: 1px solid #253041;
            background: #0c1017;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }

        .viewer-meta strong {
            color: #ffffff;
        }

        .viewer-meta a {
            color: #7dd3fc;
            text-decoration: none;
        }

        .viewer-meta a:hover {
            text-decoration: underline;
        }

        .viewer-frame-wrap {
            flex: 1;
            min-height: 0;
            background: #111827;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: 0;
            background: white;
        }

        .empty-state {
            padding: 28px 22px;
            color: #9ca3af;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="viewer-header">
        <a class="brand" href="index.html">
            <img src="logo.svg" alt="Blitz Logo">
            <h1>BLITZ VIEWER</h1>
        </a>
        <div class="viewer-actions">
            <a id="edit-link" href="editor.html">Open Editor</a>
            <a id="open-hosted-link" href="#" target="_blank" rel="noreferrer noopener">Open Hosted Site</a>
        </div>
    </header>

    <div class="viewer-meta">
        <div id="project-label">Loading project...</div>
        <div id="project-url"></div>
    </div>

    <div class="viewer-frame-wrap">
        <iframe id="project-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        <div id="empty-state" class="empty-state hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, get, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDz4P07G-B05SqCMyDdCnIyRAJNy19_1oQ",
            authDomain: "blitz-6c88c.firebaseapp.com",
            databaseURL: "https://blitz-6c88c-default-rtdb.firebaseio.com",
            projectId: "blitz-6c88c",
            storageBucket: "blitz-6c88c.firebasestorage.app",
            messagingSenderId: "390946741291",
            appId: "1:390946741291:web:e6ae60970e2847403d9e6e",
            measurementId: "G-WC5KP3MXP9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project');
        const projectLabel = document.getElementById('project-label');
        const projectUrl = document.getElementById('project-url');
        const frame = document.getElementById('project-frame');
        const emptyState = document.getElementById('empty-state');
        const editLink = document.getElementById('edit-link');
        const hostedLink = document.getElementById('open-hosted-link');

        if (!projectId) {
            projectLabel.textContent = 'No project selected.';
            emptyState.textContent = 'Add ?project=YOUR_ID to the URL.';
            emptyState.classList.remove('hidden');
            frame.style.display = 'none';
            hostedLink.style.display = 'none';
            editLink.style.display = 'none';
        } else {
            editLink.href = `editor.html?project=${encodeURIComponent(projectId)}`;

            const snapshot = await get(ref(db, `projects/${projectId}`));
            if (!snapshot.exists()) {
                projectLabel.textContent = `Project ${projectId} not found.`;
                emptyState.textContent = 'There is no project record for this id.';
                emptyState.classList.remove('hidden');
                frame.style.display = 'none';
                hostedLink.style.display = 'none';
            } else {
                const project = snapshot.val();
                await incrementProjectViews(projectId);
                const hostedWebsite = ensureTrailingSlash(project.hostedWebsite || '');
                const name = project.name || projectId;
                const viewCount = (Number(project.views) || 0) + 1;

                projectLabel.innerHTML = `<strong>${escapeHtml(name)}</strong> · ${escapeHtml(projectId)} · ${viewCount} view${viewCount === 1 ? '' : 's'}`;

                if (!hostedWebsite) {
                    emptyState.textContent = 'This project has not been published yet.';
                    emptyState.classList.remove('hidden');
                    frame.style.display = 'none';
                    hostedLink.style.display = 'none';
                } else {
                    projectUrl.innerHTML = `<a href="${escapeAttribute(hostedWebsite)}" target="_blank" rel="noreferrer noopener">${escapeHtml(hostedWebsite)}</a>`;
                    hostedLink.href = hostedWebsite;
                    frame.src = hostedWebsite;
                    emptyState.classList.add('hidden');
                }
            }
        }

        function ensureTrailingSlash(value) {
            const trimmed = String(value).trim();
            if (!trimmed) return '';
            return trimmed.endsWith('/') ? trimmed : `${trimmed}/`;
        }

        async function incrementProjectViews(id) {
            try {
                await runTransaction(ref(db, `projects/${id}/views`), (current) => (Number(current) || 0) + 1);
            } catch (error) {
                console.error('Failed to increment project views', id, error);
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttribute(value) {
            return String(value).replaceAll('"', '&quot;');
        }
    </script>
</body>
</html>
