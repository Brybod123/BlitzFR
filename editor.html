<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz - Editor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bytesized&family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body class="editor-page">
    <div class="editor-container">
        <!-- Left Side: Preview -->
        <div class="preview-side">
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>

        <!-- Right Side: Editor -->
        <div class="editor-side">
            <div class="editor-header">
                <div style="display:flex; align-items:center; gap:0.75rem; flex: 1;">
                    <img src="logo.svg" alt="Blitz Logo" class="logo-sml">
                    <h2 style="font-family:'Jersey 10'; font-size:2rem; margin:0;">BLITZ EDITOR</h2>
                </div>
                
                <div class="nav-center" style="flex: 1; display: flex; justify-content: center;">
                    <button id="btn-file-explorer" class="icon-nav-btn" title="Toggle File Explorer">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    </button>
                </div>
                
                <div style="flex: 1; display: flex; justify-content: flex-end;">
                    <div class="toggle-group main-toggles">
                        <button class="toggle-btn active" data-mode="code" title="Code">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        </button>
                        <button class="toggle-btn" data-mode="ai" title="AI Chat">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="editor-main">
                <div id="code-view" class="code-view">
                    <div class="code-layout">
                        <div id="file-explorer" class="file-explorer hidden">
                            <div class="explorer-header">
                                <span>FILES</span>
                                <button id="btn-new-file" title="New File">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                            </div>
                            <ul id="file-list" class="file-list"></ul>
                        </div>
                        <div class="editor-area">
                            <div class="code-tabs" id="code-tabs">
                                <!-- Tabs dynamically generated -->
                            </div>
                            <div class="code-editor-wrapper">
                                <div id="monaco-container" style="width: 100%; height: 100%;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="ai-editor" class="ai-editor hidden">
                    <div class="chat-history" id="chat-history">
                        <div class="chat-message ai-message">
                            <span class="chat-avatar">AI</span>
                            <div class="chat-bubble">Hello! I'm Blitz AI. What would you like to build?</div>
                        </div>
                    </div>
                    <div class="chat-input-wrapper">
                        <div class="chat-input-inner">
                            <textarea class="prompt-area" id="prompt-area" placeholder="Type a message..."></textarea>
                            <button class="btn-generate">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="editor-footer">
                <button class="save-btn">SAVE</button>
                <button class="publish-btn">PUBLISH</button>
            </div>
        </div>
    </div>

<!-- Initialize Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            const script = document.createElement('script');
            script.src = 'editor.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
